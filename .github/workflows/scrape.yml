name: Greenville Lead Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: greenville-leads
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 playwright

      - name: Install Playwright Chromium
        run: |
          python -m playwright install chromium

      - name: Run tax sale scraper
        run: |
          python fetch.py

      - name: Run probate scraper
        run: |
          python probate_fetch.py

      - name: Merge and score
        run: |
          python merge_and_score.py

      - name: Copy dashboard data
        run: |
          cp master_leads.json dashboard/master_leads.json

      - name: Commit updated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add leads.csv probate_leads.csv master_leads.csv master_leads.json dashboard/master_leads.json
          git diff --cached --quiet || git commit -m "Auto-update lead data"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard

  deploy:
    needs: scrape
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4