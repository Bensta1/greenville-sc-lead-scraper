name: Scrape Greenville Leads

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install requests beautifulsoup4 lxml playwright
          python -m playwright install chromium

      - name: Run tax scraper
        run: python fetch.py

      - name: Run probate scraper
        run: python probate_fetch.py

      - name: Build merged dashboard data
        run: python merge_and_score.py

      - name: Copy dashboard JSON to docs
        run: |
          mkdir -p docs
          cp master_leads.json docs/master_leads.json

      - name: Commit and push updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add leads.csv probate_leads.csv master_leads.json docs/master_leads.json
          git diff --cached --quiet || git commit -m "Auto-update Greenville lead data"
          git push
