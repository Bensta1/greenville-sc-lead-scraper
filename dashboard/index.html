<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greenville Lead Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="topbar">
            <h1>🔥 Greenville Motivated Seller Dashboard</h1>
            <div class="topbar-right">
                <div id="lastUpdated" class="last-updated">Last update: --</div>
                <button id="refreshBtn" class="action-btn">Refresh Data</button>
                <button id="downloadCsvBtn" class="action-btn">Download Visible CSV</button>
                <button id="downloadJsonBtn" class="action-btn">Download JSON</button>
            </div>
        </div>

        <div class="stats" id="stats">
            <div class="stat-card">
                <div class="stat-label">Total Leads</div>
                <div class="stat-value" id="totalLeads">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Tax Sale</div>
                <div class="stat-value" id="taxLeads">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Probate</div>
                <div class="stat-value" id="probateLeads">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Stacked</div>
                <div class="stat-value" id="stackedLeads">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">High Score 70+</div>
                <div class="stat-value" id="highScoreLeads">0</div>
            </div>
        </div>

        <div class="controls">
            <input type="text" id="searchInput" placeholder="Search owner...">

            <select id="filterType">
                <option value="all">All Leads</option>
                <option value="stacked">Sniper: Stacked Distress</option>
                <option value="high70">Sniper: High Score 70+</option>
                <option value="high80">Sniper: High Score 80+</option>
                <option value="high90">Sniper: High Score 90+</option>
                <option value="probate_high">Sniper: Probate + 70+</option>
                <option value="tax_high">Sniper: Tax Sale + 70+</option>
                <option value="business_high">Sniper: Business Owner + 70+</option>
                <option value="probate">Probate Only</option>
                <option value="tax">Tax Sale Only</option>
            </select>

            <select id="sortType">
                <option value="score_desc">Sort: Highest Score</option>
                <option value="score_asc">Sort: Lowest Score</option>
                <option value="owner_asc">Sort: Owner A-Z</option>
                <option value="amount_desc">Sort: Highest Amount</option>
            </select>
        </div>

        <div class="quick-filters">
            <button class="quick-filter-btn" data-filter="stacked">Stacked</button>
            <button class="quick-filter-btn" data-filter="high80">80+</button>
            <button class="quick-filter-btn" data-filter="probate_high">Probate 70+</button>
            <button class="quick-filter-btn" data-filter="tax_high">Tax 70+</button>
            <button class="quick-filter-btn" data-filter="business_high">Business 70+</button>
            <button class="quick-filter-btn" data-filter="all">Reset</button>
        </div>

        <div class="results-count" id="resultsCount">Showing 0 leads</div>

        <div class="table-wrap">
            <table id="leadsTable">
                <thead>
                    <tr>
                        <th>Owner</th>
                        <th>Tax Sale</th>
                        <th>Probate</th>
                        <th>Parcel</th>
                        <th>Amount Due</th>
                        <th>Case #</th>
                        <th>Score</th>
                        <th>Tags</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
